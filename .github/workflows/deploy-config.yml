name: Deploy Config

on:
  push:
    branches: [master]
    paths:
      - 'config/links.yml'

jobs:
  deploy-config:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags:            tag:ci-cd

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push config and reload
        env:
          SSH_DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          scp config/links.yml "$SSH_DEST:/tmp/links.yml"
          ssh "$SSH_DEST" "docker cp /tmp/links.yml short:/config/links.yml && docker kill -s HUP short && rm /tmp/links.yml"
